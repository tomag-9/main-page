services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: tomas_portfolio_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    expose:
      - "3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

  proxy:
    image: nginx:1.27-alpine
    container_name: tomas_portfolio_proxy
    restart: unless-stopped
    depends_on:
      - portfolio
    ports:
      - "3000:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

  portfolio-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: tomas-magula-portfolio:latest
    container_name: tomas_portfolio
    restart: unless-stopped
    profiles:
      - prod
    environment:
      NODE_ENV: production
